<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Task Overdue - Task Flow</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #f44336; color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; background: #f9f9f9; }
        .task-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .overdue { color: #f44336; font-weight: bold; margin-bottom: 20px; }
        .button { display: inline-block; background: #185FA5; color: white; padding: 12px 24px; text-decoration: none; border-radius: 4px; }
        .footer { text-align: center; padding: 20px; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚠️ Task Overdue</h1>
        </div>
        <div class="content">
            <p>Hello {{FirstName}},</p>
            <p>Your task is overdue:</p>
            <div class="task-title">{{TaskTitle}}</div>
            <div class="overdue">❌ This task was due in the past</div>
            <a href="{{TaskUrl}}" class="button">View Task</a>
        </div>
        <div class="footer">
            <p>This is an automated message from Task Flow.</p>
        </div>
    </div>
</body>
</html>
